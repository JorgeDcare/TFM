  <script>

    const graphs = [{"label": "Area media", "co2_1pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_1pct/stats_co2_1pct_0000_area_mean_over_time.html", "co2_5pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_5pct/stats_co2_5pct_0000_area_mean_over_time.html"}, {"label": "Area normalizada media", "co2_1pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_1pct/stats_co2_1pct_0000_normalized_area_mean_over_time.html", "co2_5pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_5pct/stats_co2_5pct_0000_normalized_area_mean_over_time.html"}, {"label": "Esfericidad media", "co2_1pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_1pct/stats_co2_1pct_0000_sphericity_mean_over_time.html", "co2_5pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_5pct/stats_co2_5pct_0000_sphericity_mean_over_time.html"}, {"label": "Esfericidad normalizada media", "co2_1pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_1pct/stats_co2_1pct_0000_normalized_sphericity_mean_over_time.html", "co2_5pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_5pct/stats_co2_5pct_0000_normalized_sphericity_mean_over_time.html"}, {"label": "Velocidad media", "co2_1pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_1pct/stats_co2_1pct_0000_velocity_mean_over_time.html", "co2_5pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_5pct/stats_co2_5pct_0000_velocity_mean_over_time.html"}, {"label": "Curva de supervivencia", "co2_1pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_1pct/co2_1pct_survival_curve.html", "co2_5pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_5pct/co2_5pct_survival_curve.html"}, {"label": "Desplazamiento acumulado", "co2_1pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_1pct/co2_1pct_cumulative_displacement.html", "co2_5pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_5pct/co2_5pct_cumulative_displacement.html"}, {"label": "AUC supervivencia", "co2_1pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_1pct/stats_co2_1pct_0000_survival_auc.html", "co2_5pct": "https://cdn.jsdelivr.net/gh/JorgeDcare/TFM@main/assets/graphs_html/co2_5pct/stats_co2_5pct_0000_survival_auc.html"}];
    const zeroHourVideoSeconds = 0.5;
    const timeStepHours = 0.5;
    const videos = Array.from(document.querySelectorAll('video'));
    const playPause = document.getElementById('playPause');
    const slider = document.getElementById('timeSlider');
    const timeReadout = document.getElementById('timeReadout');
    const speedSelect = document.getElementById('speedSelect');
    const graphSelect = document.getElementById('graphSelect');
    const graph1 = document.getElementById('graph1');
    const graph5 = document.getElementById('graph5');
    let commonVideoDuration = 1, biologicalDuration = 1, isSyncing = false;
    function finiteDurations() { return videos.map(v => v.duration).filter(Number.isFinite).filter(v => v > 0); }
    function snapBioHours(hours) { const raw = Math.max(0, Number(hours)||0); return Math.min(biologicalDuration, Math.round(raw / timeStepHours) * timeStepHours); }
    function bioHoursToVideoSeconds(hours) { const h = snapBioHours(hours); if (h <= 0) return 0; return Math.min(h + zeroHourVideoSeconds, Math.max(0, commonVideoDuration - 0.03)); }
    function videoSecondsToBioHours(seconds) { return snapBioHours(Math.max(0, seconds - zeroHourVideoSeconds)); }
    function updateReadout(hours) { timeReadout.textContent = `${Math.max(0, hours).toFixed(1)} h`; }
    function updateDuration() {
      const durations = finiteDurations();
      if (durations.length) {
        commonVideoDuration = Math.min(...durations);
        biologicalDuration = Math.max(0, commonVideoDuration - zeroHourVideoSeconds);
        biologicalDuration = Math.floor(biologicalDuration / timeStepHours) * timeStepHours;
        slider.max = biologicalDuration.toFixed(1);
      }
    }
    function syncToBioHours(hours) {
      const snapped = snapBioHours(hours);
      const seconds = bioHoursToVideoSeconds(snapped);
      isSyncing = true;
      for (const video of videos) {
        if (Number.isFinite(video.duration)) video.currentTime = Math.min(seconds, Math.max(0, video.duration - 0.03));
      }
      isSyncing = false;
      slider.value = snapped.toFixed(1);
      updateReadout(snapped);
    }
    for (const video of videos) {
      video.addEventListener('loadedmetadata', () => { updateDuration(); syncToBioHours(Number(slider.value)); });
      video.addEventListener('timeupdate', () => {
        if (isSyncing || video.paused) return;
        const h = videoSecondsToBioHours(video.currentTime);
        slider.value = h.toFixed(1);
        updateReadout(h);
      });
      video.addEventListener('play', () => { playPause.textContent = 'Pausar'; });
      video.addEventListener('pause', () => {
        if (videos.every(v => v.paused)) playPause.textContent = 'Reproducir';
      });
    }
    playPause.addEventListener('click', async () => {
      if (videos.some(v => !v.paused)) {
        videos.forEach(v => v.pause());
        playPause.textContent = 'Reproducir';
      } else {
        for (const video of videos) video.playbackRate = Number(speedSelect.value);
        for (const video of videos) await video.play().catch(() => {});
        playPause.textContent = 'Pausar';
      }
    });
    speedSelect.addEventListener('change', () => {
      for (const video of videos) video.playbackRate = Number(speedSelect.value);
    });
    slider.addEventListener('input', () => syncToBioHours(slider.value));
    document.getElementById('backHour').addEventListener('click', () => syncToBioHours(Number(slider.value) - 1));
    document.getElementById('forwardHour').addEventListener('click', () => syncToBioHours(Number(slider.value) + 1));
    function renderGraph(index) {
      const graph = graphs[index] || graphs[0];
      graph1.innerHTML = graph.co2_1pct ? `<iframe title="${graph.label} 1% CO2" src="${graph.co2_1pct}" scrolling="no"></iframe>` : '<div class="missing-graph">Sin gráfica</div>';
      graph5.innerHTML = graph.co2_5pct ? `<iframe title="${graph.label} 5% CO2" src="${graph.co2_5pct}" scrolling="no"></iframe>` : '<div class="missing-graph">Sin gráfica</div>';
    }
    graphSelect.addEventListener('change', () => renderGraph(Number(graphSelect.value)));
    renderGraph(0);
